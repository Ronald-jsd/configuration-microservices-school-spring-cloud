spring:

  datasource:
    url: jdbc:mysql://localhost:3306/student-db
    username: ${STUDENT_DB_USER}
    password: ${STUDENT_DB_PASSWORD}

  cloud:
    loadbalancer:
      ribbon:
        enabled: false
      cache:
        enabled: true
      health-check:
        initial-delay: 5s
        interval: 5s
        refetch-instances: true

  jpa:
    hibernate:
      ddl-auto: update
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: false

  sql:
    init:
      mode: always

eureka:
  instance:
    hostname: localhost

  client:
    service-url:

      defaultZone: http://localhost:8761/eureka

