server:
  port: 8081

spring:
  application:
    name: mcsv-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

      routes:

        - id: students
          uri: lb://mcsv-student
          predicates:
            - Path=/api/v1/students/**
          filters:
            - StripPrefix=2
            - AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 3
                key-resolver: "#{@ipKeyResolver}"

        - id: courses
          uri: lb://mcsv-course
          predicates:
            - Path=/api/v1/courses/**
          filters:
            - StripPrefix=2
            - AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 3
                key-resolver: "#{@ipKeyResolver}"

        - id: auth
          uri: lb://microservice-auth
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    org.springframework.web: DEBUG
    com.netflix.discovery: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}
