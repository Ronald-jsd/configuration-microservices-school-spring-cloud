server:
  port: 8761

spring:
  application:
    name: mcsv-eureka

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://microservice-eureka:8761/eureka
  
  instance:
    prefer-ip-address: true
    
management:
  endpoints:
    web:
      exposure:
        include: health,info
        
  endpoint:
    health:
      show-details: always
